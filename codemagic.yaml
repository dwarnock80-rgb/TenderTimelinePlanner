workflows:
  ios-workflow:
    name: iOS Workflow
    environment:
      xcode: latest

    scripts:
      - name: Build iOS app
        script: |
          xcodebuild build \
            -project TenderTimelinePlanner.xcodeproj \
            -scheme TenderTimelinePlanner \
            -destination "generic/platform=iOS Simulator"

    artifacts:
      - build/**/*.app
