workflows:
  ios-workflow:
    name: iOS Workflow
    environment:
      xcode: latest

    scripts:
  - name: Build iOS app
    script: |
      xcodebuild archive \
        -project TenderTimelinePlanner.xcodeproj \
        -scheme TenderTimelinePlanner \
        -destination "generic/platform=iOS" \
        -archivePath build/TenderTimelinePlanner.xcarchive

    artifacts:
      - build/**/*.app
