workflows:
  ios-workflow:
    name: iOS Workflow
    environment:
      xcode: latest

    scripts:
      - name: Build iOS app
        script: |
          xcodebuild build \
            -project TenderTimelinePlanner.xcodeproj \
            -scheme TenderTimelinePlanner \
            -destination 'platform=iOS Simulator,name=iPhone 15'

    artifacts:
      - build/**/*.app
